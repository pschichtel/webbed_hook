name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    strategy:
      matrix:
        artifact:
          - bin: 'webbed_hook'
            manifest: 'Cargo.toml'
          - bin: 'webbed_hook_receiver'
            manifest: 'receiver/Cargo.toml'
    name: Upload ${{ matrix.artifact.bin }}
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          profile: 'release'
          target: x86_64-unknown-linux-musl
          bin: ${{ matrix.artifact.bin }}
          token: ${{ secrets.GITHUB_TOKEN }}
          archive: ${{ matrix.artifact.bin }}
          manifest-path: ${{ matrix.artifact.manifest }}